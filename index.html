<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcTip</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
width:100%;
max-width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

#connect{
background:#3b82f6;
color:white;
}

#donate{
background:#22c55e;
color:white;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
margin-top:10px;
}

.wallet{
margin-top:15px;
padding:10px;
background:#0f172a;
border-radius:10px;
word-break:break-all;
font-size:13px;
}

.status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.footer{
margin-top:20px;
text-align:center;
color:#94a3b8;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h1>ArcTip</h1>

<p class="subtitle">
Support creators on Arc Network
</p>

<button id="connect">
Connect Wallet
</button>

<div id="wallet" class="wallet">
Not Connected
</div>

<input
type="text"
id="message"
placeholder="Leave a message">

<input
type="number"
id="amount"
placeholder="Amount in ARC">

<button id="donate">
Send Donation
</button>

<div id="status" class="status"></div>

<div class="footer">
Built by Zaksonboy ❤️
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<script>

const contractAddress =
"0x5701F895cAa3D197412b1a0C7B7784Ab6497f9A2";

const abi = [
{
"inputs":[
{
"internalType":"string",
"name":"message",
"type":"string"
}
],
"name":"donate",
"outputs":[],
"stateMutability":"payable",
"type":"function"
}
];

let signer;
let contract;

document.getElementById("connect")
.onclick = async () => {

if(!window.ethereum){
alert("Please install a wallet");
return;
}

const provider =
new ethers.BrowserProvider(
window.ethereum
);

await provider.send(
"eth_requestAccounts",
[]
);

signer =
await provider.getSigner();

contract =
new ethers.Contract(
contractAddress,
abi,
signer
);

const address =
await signer.getAddress();

document.getElementById("wallet")
.innerText =
"Connected:\n" +
address;

document.getElementById("status")
.innerText =
"Wallet Connected";
};

document.getElementById("donate")
.onclick = async () => {

const message =
document.getElementById("message")
.value;

const amount =
document.getElementById("amount")
.value;

if(!amount){
alert("Enter amount");
return;
}

try{

document.getElementById("status")
.innerText =
"Waiting for confirmation...";

const tx =
await contract.donate(
message,
{
value:
ethers.parseEther(
amount
)
}
);

document.getElementById("status")
.innerHTML =
`
Transaction Sent ✅
<br><br>
<a href="https://testnet.arcscan.app/tx/${tx.hash}"
target="_blank">
View Transaction 🔗
</a>
`;

await tx.wait();

document.getElementById("status")
.innerHTML =
`
Donation Successful 🎉
<br><br>
<a href="https://testnet.arcscan.app/tx/${tx.hash}"
target="_blank">
View Transaction 🔗
</a>
`;

document.getElementById("message")
.value = "";

document.getElementById("amount")
.value = "";

}
catch(err){

document.getElementById("status")
.innerText =
err.message;

console.log(err);

}
};

</script>

</body>
</html>
