<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcDonate</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  background: radial-gradient(ellipse at top, #0f172a 0%, #020617 100%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  background: rgba(30, 41, 59, 0.75);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 32px 28px;
  width: 100%;
  max-width: 430px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, #60a5fa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-top: 18px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.char-count {
  font-size: 11px;
  color: #475569;
  font-weight: 400;
  transition: color 0.2s;
}
.char-count.warn { color: #f59e0b; }
.char-count.over { color: #ef4444; }

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  transition: opacity 0.15s, transform 0.1s;
}

button:hover:not(:disabled) {
  opacity: 0.88;
  transform: translateY(-1px);
}

button:active:not(:disabled) {
  transform: translateY(0);
}

#connectBtn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  margin-top: 4px;
}

#connectBtn:disabled {
  background: #1e3050;
  color: #4b5563;
  cursor: not-allowed;
  opacity: 1;
}

#donateBtn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  margin-top: 10px;
}

#donateBtn:disabled {
  background: #1e3a2a;
  color: #4b5563;
  cursor: not-allowed;
  opacity: 1;
  transform: none;
}

input {
  width: 100%;
  padding: 13px 16px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  background: #0f172a;
  color: white;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: #3b82f6; }
input:disabled { opacity: 0.4; cursor: not-allowed; }
input::placeholder { color: #475569; }

.wallet-box {
  margin-top: 14px;
  padding: 12px 14px;
  background: #0f172a;
  border-radius: 12px;
  font-size: 12px;
  color: #64748b;
  word-break: break-all;
  border: 1px solid #1e293b;
  line-height: 1.6;
}

.wallet-box.connected {
  color: #34d399;
  border-color: #14532d;
}

.wallet-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #64748b;
  margin-right: 6px;
  vertical-align: middle;
}

.wallet-dot.connected {
  background: #34d399;
  box-shadow: 0 0 6px #34d399;
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  text-align: center;
  font-size: 13px;
  line-height: 1.6;
  display: none;
}

.status.info    { background: rgba(59,130,246,0.1);  border: 1px solid rgba(59,130,246,0.2);  color: #93c5fd; display: block; }
.status.success { background: rgba(34,197,94,0.1);   border: 1px solid rgba(34,197,94,0.2);   color: #86efac; display: block; }
.status.error   { background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.2);   color: #fca5a5; display: block; }
.status a { color: #60a5fa; text-decoration: underline; }

.divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin: 22px 0 18px;
}

.contract-info {
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(96,165,250,0.06);
  border: 1px solid rgba(96,165,250,0.15);
  border-radius: 10px;
  font-size: 11px;
  color: #64748b;
  word-break: break-all;
  line-height: 1.7;
}

.contract-info span { color: #60a5fa; }

.stats-card {
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.15);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: center;
}

.stats-title {
  color: #94a3b8;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stats-value {
  font-size: 28px;
  font-weight: 700;
  color: #34d399;
  margin-top: 6px;
}

.footer {
  margin-top: 22px;
  text-align: center;
  color: #475569;
  font-size: 12px;
}

.footer a { color: #60a5fa; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <img src="20260101_225005.jpg" alt="Arc Logo">
</div>

<h1>ArcDonate</h1>
  <p class="subtitle">Send USDC donations on Arc Testnet</p>

  <div class="stats-card">
    <div class="stats-title">Total Raised</div>
    <div class="stats-value" id="totalRaised">0 USDC</div>
  </div>

  <button id="connectBtn">🔗 Connect Wallet</button>

<div class="wallet-box" id="walletBox">
    <span class="wallet-dot"></span>Not connected
</div>

<div class="wallet-box" id="balanceBox">
    Balance: -- USDC
</div>

  <hr class="divider">

  <p class="section-label">
    Message <span style="color:#475569;font-weight:400">(optional)</span>
    <span class="char-count" id="charCount">0 / 120</span>
  </p>
  <input type="text" id="message" placeholder="Leave a note with your donation" maxlength="120">

  <p class="section-label">Amount (USDC)</p>
  <input type="number" id="amount" placeholder="e.g. 1.00" step="0.01" min="0">

  <button id="donateBtn" disabled> Send Donation</button>

  <div class="contract-info">
    ℹ️ Donations go to contract:<br>
    <span>0x5701F895cAa3D197412b1a0C7B7784Ab6497f9A2</span>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    Built by <a href="https://x.com/esmereelumar" target="_blank">@esmereelumar</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<script>

  // ─── Arc Testnet Config ───────────────────────────────────────────
  const ARC_CHAIN_ID = "0x4cef52";
  const ARC_RPC      = "https://rpc.testnet.arc.network";
  const ARC_NAME     = "Arc Testnet";

  // ─── Contract ─────────────────────────────────────────────────────
  // Confirmed Solidity signature:
  //   function donate(string memory message) public payable
  // USDC is the native token on Arc — msg.value IS USDC.
  const contractAddress = "0x5701F895cAa3D197412b1a0C7B7784Ab6497f9A2";

  const abi = [
    {
      "inputs": [
        { "internalType": "string", "name": "message", "type": "string" }
      ],
      "name": "donate",
      "outputs": [],
      "stateMutability": "payable",
      "type": "function"
    }
  ];

  let signer   = null;
  let contract = null;
  let provider = null;

  // Total Raised: always uses public provider, no wallet needed
  async function loadTotalRaised() {
    try {
      const pub       = new ethers.JsonRpcProvider(ARC_RPC);
      const balance   = await pub.getBalance(contractAddress);
      const formatted = parseFloat(ethers.formatEther(balance)).toFixed(4);
      document.getElementById("totalRaised").textContent = formatted + " USDC";
    } catch (err) {
      console.error("Could not fetch total raised:", err);
    }
  }


  // ─── Char counter ─────────────────────────────────────────────────
  document.getElementById("message").addEventListener("input", function () {
    const len = this.value.length;
    const el  = document.getElementById("charCount");
    el.textContent = len + " / 120";
    el.className   = "char-count" + (len >= 120 ? " over" : len >= 90 ? " warn" : "");
  });

  // ─── Helpers ──────────────────────────────────────────────────────
  function setStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.className = "status " + type;
  }

  function setConnectBtn(state) {
    const btn = document.getElementById("connectBtn");
    if (state === "loading") {
      btn.disabled    = true;
      btn.textContent = "⏳ Connecting...";
    } else if (state === "connected") {
      btn.disabled    = true;
      btn.textContent = "✅ Connected";
    } else if (state === "idle") {
      btn.disabled    = false;
      btn.textContent = "🔗 Connect Wallet";
    }
  }

  function setDonateBtn(loading) {
    const btn = document.getElementById("donateBtn");
    btn.disabled    = loading;
    btn.textContent = loading ? "⏳ Processing..." : "💚 Send Donation";
  }

  function setInputsDisabled(disabled) {
    document.getElementById("message").disabled = disabled;
    document.getElementById("amount").disabled  = disabled;
  }

  function setWallet(address) {
    const box   = document.getElementById("walletBox");
    const short = address.slice(0, 6) + "..." + address.slice(-4);
    box.innerHTML = `<span class="wallet-dot connected"></span>Connected: ${short}`;
    box.classList.add("connected");
  }
async function loadBalance() {
    const balance = await provider.getBalance(await signer.getAddress());

    document.getElementById("balanceBox").textContent =
        "Balance: " +
        parseFloat(ethers.formatEther(balance)).toFixed(4) +
        " USDC";
}
  async function switchToArc() {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: ARC_CHAIN_ID }]
      });
    } catch (err) {
      if (err.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: ARC_CHAIN_ID,
            chainName: ARC_NAME,
            rpcUrls: [ARC_RPC],
            nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 }
          }]
        });
      } else {
        throw err;
      }
    }
  }

  // ─── Connect Wallet ───────────────────────────────────────────────
  document.getElementById("connectBtn").onclick = async () => {

    if (!window.ethereum) {
      setStatus("⚠️ No wallet detected. Please install MetaMask.", "error");
      return;
    }

    setConnectBtn("loading");

    try {
      setStatus("⏳ Connecting wallet...", "info");

      await window.ethereum.request({ method: "eth_requestAccounts" });
      await switchToArc();

      provider = new ethers.BrowserProvider(window.ethereum);
      signer   = await provider.getSigner();
      contract = new ethers.Contract(contractAddress, abi, signer);

      const address = await signer.getAddress();
setWallet(address);
await loadBalance();
setConnectBtn("connected");
      document.getElementById("donateBtn").disabled = false;
      setStatus("✅ Connected to " + ARC_NAME, "success");
      await loadTotalRaised();

    } catch (err) {
      console.error(err);
      setConnectBtn("idle");
      setStatus("❌ " + (err.message || "Connection failed"), "error");
    }
  };

  // ─── Send Donation ────────────────────────────────────────────────
  document.getElementById("donateBtn").onclick = async () => {

    if (!contract?.target || !signer) {
      setStatus("⚠️ Please connect your wallet first.", "error");
      return;
    }

    const message = document.getElementById("message").value.trim();
    const amount  = document.getElementById("amount").value.trim();

    if (message.length > 120) {
      setStatus("⚠️ Message too long (max 120 characters).", "error");
      return;
    }

    if (!amount || parseFloat(amount) <= 0) {
      setStatus("⚠️ Please enter a valid donation amount.", "error");
      return;
    }

    setDonateBtn(true);
    setInputsDisabled(true);

    try {
      setStatus("⏳ Waiting for wallet approval...", "info");

      // Native USDC donation via msg.value
      const tx = await contract.donate(message, {
        value: ethers.parseEther(amount)
      });

      setStatus(
        `📡 Transaction sent! Waiting for confirmation...<br>
         <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View on ArcScan 🔗</a>`,
        "info"
      );

      await tx.wait();

      setStatus(
        `🎉 Donation confirmed!<br>
         <a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank">View on ArcScan 🔗</a>`,
        "success"
      );

      await loadTotalRaised();

      document.getElementById("message").value = "";
      document.getElementById("amount").value  = "";
      document.getElementById("charCount").textContent = "0 / 120";
      document.getElementById("charCount").className   = "char-count";

    } catch (err) {
      console.error(err);
      const msg = err?.reason || err?.shortMessage || err?.message || "Transaction failed";
      setStatus("❌ " + msg, "error");
    } finally {
      setDonateBtn(false);
      setInputsDisabled(false);
    }
  };

  // Load total raised on page open — no wallet needed
  window.addEventListener("load", () => loadTotalRaised());

</script>

</body>
</html>
